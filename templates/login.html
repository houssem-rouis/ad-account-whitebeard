{% extends 'base.html' %}
{% block title %}Sign in · Whitebeard Ad Studio{% endblock %}
{% block content %}
<div class="row justify-content-center pt-md-5">
  <div class="col-12 col-sm-9 col-md-7 col-lg-5">
    <div class="card card-elevated p-4 p-md-5">
      <p class="eyebrow mb-2">Welcome back</p>
      <h1 class="h3 fw-bold mb-1">Sign in</h1>
      <p class="text-muted mb-4">Manage Meta campaigns, review creatives, and surface insights across all your ad accounts.</p>
      <form method="post" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" type="text" name="username" class="form-control" autocomplete="username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label" for="password">Password</label>
          <input id="password" type="password" name="password" class="form-control" autocomplete="current-password" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Sign in</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
