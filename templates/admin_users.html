{% extends 'base.html' %}
{% block content %}
<h2>Manage users</h2>
<div class="mb-3">
  <a class="btn btn-primary" href="{{ url_for('admin_create_user') }}">Create user</a>
</div>
<div class="card p-3">
  {% if users %}
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Username</th>
          <th>Admin</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.username }}</td>
          <td>{{ 'Yes' if user.is_admin else 'No' }}</td>
          <td>
            <form method="post" action="{{ url_for('admin_delete_user', user_id=user.id) }}" class="d-inline">
              <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  {% else %}
    <p>No users created yet.</p>
  {% endif %}
</div>
{% endblock %}
