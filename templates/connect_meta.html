{% extends 'base.html' %}
{% block content %}
<h2>Connect Meta Ads</h2>
<div class="card p-3">
  <p>Use your Meta (Facebook) ad account access token and ad account ID to connect this account.</p>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Meta access token</label>
      <input type="text" name="access_token" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Meta ad account ID</label>
      <input type="text" name="ad_account_id" class="form-control" placeholder="act_1234567890" required>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Connect Meta Ads</button>
    </div>
  </form>
</div>
{% endblock %}
